{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STOCKR — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{--bg:#07070e;--surface:#0d0d1a;--surface2:#111121;--border:#1a1a2e;--border2:#23233d;--text:#e2e0ff;--muted:#3d3b60;--muted2:#5c5a88;--accent:#7c6af7;--accent-l:#a99fff;--green:#1fd4a0;--red:#ff4d6d;--amber:#f5a623;--blue:#4db8ff}
      html,body{height:100%;overflow:hidden}
      body{background:var(--bg);color:var(--text);font-family:"Syne",sans-serif;display:flex}
      #sidebar{width:224px;min-width:224px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s,min-width .2s;overflow:hidden;z-index:10}
      #sidebar.col{width:56px;min-width:56px}
      .sb-logo{display:flex;align-items:center;gap:10px;padding:20px 16px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap}
      .sb-logo .ico{font-size:22px;color:var(--accent);flex-shrink:0}
      .sb-logo .ttl{font-weight:800;font-size:15px;letter-spacing:.18em}
      .sb-nav{flex:1;padding:8px 0;overflow-y:auto;overflow-x:hidden}
      .ni{display:flex;align-items:center;gap:11px;width:100%;padding:10px 16px;background:none;border:none;color:var(--muted2);cursor:pointer;font-family:"Syne",sans-serif;font-size:13px;white-space:nowrap;text-align:left;transition:color .15s,background .15s;border-right:2px solid transparent}
      .ni:hover{color:var(--accent-l);background:#ffffff06}
      .ni.on{color:var(--accent-l);background:#7c6af710;border-right-color:var(--accent)}
      .ni .i{font-size:16px;width:22px;text-align:center;flex-shrink:0}
      .sb-foot{padding:12px 14px;border-top:1px solid var(--border)}
      .sb-user{display:flex;align-items:center;gap:9px;margin-bottom:10px;white-space:nowrap;overflow:hidden}
      .sb-av{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
      .sb-un{font-size:13px;font-weight:600}
      .sb-role{font-size:10px;color:var(--muted2);font-family:"Space Mono",monospace;text-transform:uppercase;letter-spacing:.06em}
      .logout{width:100%;padding:8px;background:#ff4d6d12;border:1px solid #ff4d6d28;border-radius:6px;color:var(--red);font-family:"Space Mono",monospace;font-size:11px;cursor:pointer;letter-spacing:.06em;transition:background .2s}
      .logout:hover{background:#ff4d6d22}
      #main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
      #topbar{display:flex;align-items:center;justify-content:space-between;padding:0 26px;height:56px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
      #topbar h1{font-size:17px;font-weight:700;letter-spacing:.05em}
      .date-badge{font-family:"Space Mono",monospace;font-size:11px;color:var(--muted2);background:var(--border);padding:4px 10px;border-radius:4px}
      #content{flex:1;overflow-y:auto;padding:22px 26px}
      #toast{position:fixed;top:16px;right:16px;z-index:999;padding:10px 18px;border-radius:8px;font-family:"Space Mono",monospace;font-size:12px;display:none;max-width:320px;box-shadow:0 8px 32px #00000060;animation:slin .2s ease}
      #toast.ok{background:#1fd4a012;border:1px solid #1fd4a040;color:var(--green)}
      #toast.err{background:#ff4d6d12;border:1px solid #ff4d6d40;color:var(--red)}
      @keyframes slin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
      #ov{display:none;position:fixed;inset:0;background:#00000090;align-items:center;justify-content:center;z-index:50}
      #ov.open{display:flex}
      #mb{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:28px 32px;width:520px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px #00000090;animation:slin .2s ease}
      .mt{font-size:15px;font-weight:700;margin-bottom:20px}
      .fg{display:grid;grid-template-columns:1fr 1fr;gap:13px}
      .fg.one{grid-template-columns:1fr}
      .fgrp{display:flex;flex-direction:column;gap:5px}
      .fgrp.full{grid-column:1/-1}
      .fl{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase}
      .fc{font-family:"Space Mono",monospace;background:#0a0a12;border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:8px 11px;font-size:12px;width:100%;outline:none;transition:border-color .2s}
      .fc:focus{border-color:var(--accent)}
      textarea.fc{height:72px;resize:vertical}
      select.fc{cursor:pointer}
      .ma{display:flex;gap:9px;margin-top:20px}
      .btn{border:none;border-radius:7px;padding:8px 16px;cursor:pointer;font-family:"Syne",sans-serif;font-weight:600;font-size:13px;transition:opacity .15s,transform .1s;letter-spacing:.03em}
      .btn:hover{opacity:.88}.btn:active{transform:scale(.97)}
      .bp{background:var(--accent);color:#fff}
      .bg{background:transparent;color:var(--muted2);border:1px solid var(--border2)}.bg:hover{color:var(--text)}
      .bd{background:#ff4d6d18;color:var(--red);border:1px solid #ff4d6d28}
      .bsm{padding:4px 10px;font-size:11px;border-radius:5px}
      .bsu{background:#1fd4a018;color:var(--green);border:1px solid #1fd4a028}
      .bsa{background:#f5a62318;color:var(--amber);border:1px solid #f5a62328}
      .tw{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
      table{width:100%;border-collapse:collapse}
      thead{background:#0a0a12}
      th{padding:10px 14px;text-align:left;font-family:"Space Mono",monospace;font-size:10px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border)}
      td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);color:#c8c5f0;vertical-align:middle}
      tr:last-child td{border-bottom:none}
      tr:hover td{background:#ffffff03}
      .tda{display:flex;gap:5px;flex-wrap:wrap}
      .tb{display:flex;gap:9px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
      .si{font-family:"Space Mono",monospace;background:var(--surface);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:8px 13px;font-size:12px;outline:none;width:230px;transition:border-color .2s}
      .si:focus{border-color:var(--accent)}
      .pill{font-family:"Space Mono",monospace;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.06em;border:1px solid}
      .pdraft{color:#7c6af7;background:#7c6af712;border-color:#7c6af730}
      .psent{color:var(--blue);background:#4db8ff12;border-color:#4db8ff30}
      .preceived,.pdelivered{color:var(--green);background:#1fd4a012;border-color:#1fd4a030}
      .ppending{color:var(--amber);background:#f5a62312;border-color:#f5a62330}
      .pshipped{color:var(--blue);background:#4db8ff12;border-color:#4db8ff30}
      .pcancelled{color:var(--red);background:#ff4d6d12;border-color:#ff4d6d30}
      .pin{color:var(--green);background:#1fd4a012;border-color:#1fd4a030}
      .pout{color:var(--red);background:#ff4d6d12;border-color:#ff4d6d30}
      .dg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
      .sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden}
      .sc::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--c)}
      .si2{font-size:22px;margin-bottom:8px;color:var(--c)}
      .slbl{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
      .sval{font-size:26px;font-weight:800;color:var(--c)}
      .dr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
      .dc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
      .dc h3{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
      .br{display:flex;align-items:center;gap:10px;margin-bottom:9px}
      .bl{font-size:12px;color:var(--muted2);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .bt{flex:1;background:var(--border);border-radius:4px;height:7px;overflow:hidden}
      .bf{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-l));border-radius:4px;transition:width .5s}
      .bv{font-family:"Space Mono",monospace;font-size:11px;color:var(--muted2);width:34px;text-align:right}
      .ar{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
      .ar:last-child{border-bottom:none}
      .spw{display:flex;align-items:center;justify-content:center;padding:56px}
      .sp{width:28px;height:28px;border:3px solid var(--border2);border-top:3px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .emp{text-align:center;padding:44px;color:var(--muted);font-family:"Space Mono",monospace;font-size:12px}
      .items-tbl{width:100%;border-collapse:collapse;margin-top:12px}
      .items-tbl th{padding:7px 10px;font-family:"Space Mono",monospace;font-size:10px;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border2);text-align:left}
      .items-tbl td{padding:7px 10px;font-size:12px;border-bottom:1px solid var(--border)}
      .items-tbl tr:last-child td{border-bottom:none}
      .add-item-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:end;margin-top:10px}
      .drow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
      .drow:last-child{border-bottom:none}
      .dk{font-family:"Space Mono",monospace;font-size:11px;color:var(--muted2)}
      .dv{font-size:13px;font-weight:600}
      .rbtns{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px}
      .rcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px}
      .rkv{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;background:#0a0a12;border-radius:8px;margin-bottom:9px}
      .rkk{font-family:"Space Mono",monospace;font-size:11px;color:var(--muted2);text-transform:capitalize}
      .rkv2{font-size:26px;font-weight:800;color:var(--accent)}
      .rhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
      .rlbl{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase}
      .rcnt{font-family:"Space Mono",monospace;font-size:11px;color:var(--muted2)}
      .rexp{display:flex;gap:8px}
      .mono{font-family:"Space Mono",monospace}
      @media(max-width:880px){.dg{grid-template-columns:1fr 1fr}.dr{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <aside id="sidebar">
      <div class="sb-logo" onclick="toggleSb()" title="Toggle sidebar">
        <span class="ico">▦</span>
        <span class="ttl lbl">STOCKR</span>
      </div>
      <nav class="sb-nav" id="sbNav"></nav>
      <div class="sb-foot">
        <div class="sb-user">
          <div class="sb-av" id="sbAv">?</div>
          <div class="lbl">
            <div class="sb-un" id="sbName">—</div>
            <div class="sb-role" id="sbRole">—</div>
          </div>
        </div>
        <button class="logout" onclick="logout()">⏻ LOGOUT</button>
      </div>
    </aside>
    <div id="main">
      <div id="topbar">
        <h1 id="pgTitle">Dashboard</h1>
        <span class="date-badge" id="dateBadge"></span>
      </div>
      <div id="content"></div>
    </div>
    <div id="toast"></div>
    <div id="ov" onclick="closeMod()">
      <div id="mb" onclick="event.stopPropagation()">
        <div id="mc"></div>
      </div>
    </div>
    <script type="module">
      if (!localStorage.getItem("access_token")) { location.href = "/login/"; }
      else {
        const ref = localStorage.getItem("refresh_token");
        if (ref) {
          fetch("/api/auth/refresh/", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({refresh:ref})
          }).then(r => { if(r.ok) r.json().then(d => { localStorage.setItem("access_token",d.access); if(d.refresh) localStorage.setItem("refresh_token",d.refresh); }); else { localStorage.clear(); location.href="/login/"; }}).catch(()=>{});
        }
      }
      import { USER, ROLE, logout, openMod, closeMod } from "{% static 'web/js/core.js' %}";
      import { renderDash }       from "{% static 'web/js/dashboard.js' %}";
      import { renderProducts }   from "{% static 'web/js/products.js' %}";
      import { renderInventory }  from "{% static 'web/js/inventory.js' %}";
      import { renderWarehouses } from "{% static 'web/js/warehouses.js' %}";
      import { renderPurchase }   from "{% static 'web/js/purchase.js' %}";
      import { renderSales }      from "{% static 'web/js/sales.js' %}";
      import { renderSuppliers }  from "{% static 'web/js/suppliers.js' %}";
      import { renderCategories } from "{% static 'web/js/categories.js' %}";
      import { renderMovements }  from "{% static 'web/js/movements.js' %}";
      import { renderReports }    from "{% static 'web/js/reports.js' %}";
      import { renderUsers }      from "{% static 'web/js/users.js' %}";
      window.logout=logout; window.closeMod=closeMod; window.openMod=openMod;
      document.getElementById("sbName").textContent = USER;
      document.getElementById("sbRole").textContent = ROLE;
      document.getElementById("sbAv").textContent   = (USER[0]||"?").toUpperCase();
      document.getElementById("dateBadge").textContent = new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});
      const TABS=[
        {id:"dashboard", ico:"◈",lbl:"Dashboard"},
        {id:"products",  ico:"⬡",lbl:"Products"},
        {id:"inventory", ico:"▦",lbl:"Inventory"},
        {id:"warehouses",ico:"⌂",lbl:"Warehouses"},
        {id:"purchase",  ico:"↓",lbl:"Purchase Orders"},
        {id:"sales",     ico:"↑",lbl:"Sale Orders"},
        {id:"suppliers", ico:"◎",lbl:"Suppliers"},
        {id:"categories",ico:"⊞",lbl:"Categories"},
        {id:"movements", ico:"⇌",lbl:"Movements"},
        {id:"reports",   ico:"≋",lbl:"Reports"},
        {id:"users",     ico:"⊙",lbl:"Users"},
      ];
      const RENDERERS={dashboard:renderDash,products:renderProducts,inventory:renderInventory,warehouses:renderWarehouses,purchase:renderPurchase,sales:renderSales,suppliers:renderSuppliers,categories:renderCategories,movements:renderMovements,reports:renderReports,users:renderUsers};
      let curTab="dashboard";
      const nav=document.getElementById("sbNav");
      TABS.forEach(t=>{
        if(t.id==="users"&&ROLE!=="admin") return;
        const b=document.createElement("button");
        b.className="ni"+(t.id===curTab?" on":"");
        b.id="n-"+t.id;
        b.innerHTML=`<span class="i">${t.ico}</span><span class="lbl">${t.lbl}</span>`;
        b.onclick=()=>go(t.id);
        nav.appendChild(b);
      });
      function go(id){
        curTab=id;
        TABS.forEach(t=>{const e=document.getElementById("n-"+t.id);if(e)e.className="ni"+(t.id===id?" on":"");});
        document.getElementById("pgTitle").textContent=TABS.find(t=>t.id===id)?.lbl||id;
        (RENDERERS[id]||renderDash)();
      }
      window.go=go;
      window.toggleSb=()=>document.getElementById("sidebar").classList.toggle("col");
      go("dashboard");
    </script>
  </body>
</html>
